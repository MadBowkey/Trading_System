rules:
  - rule_id: VAL_TSV_001
    station: 3
    validator: TechnicalSchemaValidator
    category: technical_schema
    trigger: JSON is not parseable.
    validator_status: BLOCKED
    system_status: SAFE_HOLD
    pipeline_action: STOP
    repair_allowed: false
    audit_required: true

  - rule_id: VAL_TSV_002
    station: 3
    validator: TechnicalSchemaValidator
    category: technical_schema
    trigger: Required Pydantic field is missing.
    validator_status: BLOCKED
    system_status: SAFE_HOLD
    pipeline_action: STOP
    repair_allowed: false
    audit_required: true

  - rule_id: VAL_TSV_003
    station: 3
    validator: TechnicalSchemaValidator
    category: technical_schema
    trigger: Invalid datatype, enum value or numeric range.
    validator_status: BLOCKED
    system_status: SAFE_HOLD
    pipeline_action: STOP
    repair_allowed: false
    audit_required: true

  - rule_id: VAL_TSV_004
    station: 3
    validator: TechnicalSchemaValidator
    category: technical_schema
    trigger: target_allocation_adjustments contains more than 5 entries.
    validator_status: BLOCKED
    system_status: SAFE_HOLD
    pipeline_action: STOP
    repair_allowed: false
    audit_required: true

  - rule_id: VAL_TSV_005
    station: 3
    validator: TechnicalSchemaValidator
    category: technical_schema
    trigger: reasoning_short exceeds 150 characters.
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: Truncate reasoning_short exactly to 150 characters.
    audit_required: true

  - rule_id: VAL_BLV_001
    station: 4
    validator: BusinessLogicValidator
    category: business_logic
    trigger: "Duplicate asset_id in target_allocation_adjustments."
    status_resolution: conditional
    allowed_outcomes:
      - validator_status: DOWNGRADED
        system_status: NORMAL_CONTINUE
        pipeline_action: CONTINUE
      - validator_status: BLOCKED
        system_status: SAFE_HOLD
        pipeline_action: STOP
    repair_allowed: conditional
    allowed_repair: "Identical duplicates: keep one. INCREASE vs HOLD: downgrade to HOLD. Fundamental conflicts such as INCREASE vs LIQUIDATE: BLOCKED."
    audit_required: true

  - rule_id: VAL_BLV_002
    station: 4
    validator: BusinessLogicValidator
    category: business_logic
    trigger: "strategy_regime is CASH_ONLY but risk_multiplier_override is not 0.0."
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: "Set risk_multiplier_override to 0.0."
    audit_required: true

  - rule_id: VAL_BLV_003
    station: 4
    validator: BusinessLogicValidator
    category: business_logic
    trigger: "strategy_regime is CASH_ONLY but one or more risk permission flags are true."
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: "Set allow_new_positions, allow_add_ons and allow_risk_increase to false."
    audit_required: true

  - rule_id: VAL_BLV_004
    station: 4
    validator: BusinessLogicValidator
    category: business_logic
    trigger: "strategy_regime is CASH_ONLY but at least one asset action is INCREASE."
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: "Downgrade all INCREASE actions to HOLD."
    audit_required: true

  - rule_id: VAL_BLV_005
    station: 4
    validator: BusinessLogicValidator
    category: business_logic
    trigger: "strategy_regime is DEFENSIVE but allow_add_ons is true."
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: "Set allow_add_ons to false."
    audit_required: true

  - rule_id: VAL_BLV_006
    station: 4
    validator: BusinessLogicValidator
    category: business_logic
    trigger: "strategy_regime is BUILDUP or DEFENSIVE and risk_multiplier_override is below 0.1."
    validator_status: BLOCKED
    system_status: SAFE_HOLD
    pipeline_action: STOP
    repair_allowed: false
    audit_required: true

  - rule_id: VAL_BLV_007
    station: 4
    validator: BusinessLogicValidator
    category: business_logic
    trigger: "allow_risk_increase is false but at least one asset action is INCREASE."
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: "Downgrade all INCREASE actions to HOLD."
    audit_required: true

  - rule_id: VAL_MRV_004A
    station: 5
    validator: MarketRiskValidator
    category: market_risk_universe
    trigger: "Asset is not in User Managed Universe and no current portfolio position exists."
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: "Remove asset from target_allocation_adjustments."
    audit_required: true

  - rule_id: VAL_MRV_004B
    station: 5
    validator: MarketRiskValidator
    category: market_risk_universe
    trigger: "Asset is not in User Managed Universe but a current portfolio position exists and requested action is INCREASE."
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: "Downgrade action from INCREASE to HOLD."
    audit_required: true

  - rule_id: VAL_MRV_004C
    station: 5
    validator: MarketRiskValidator
    category: market_risk_universe
    trigger: "Asset is not in User Managed Universe but a current portfolio position exists and requested action is HOLD, DECREASE or LIQUIDATE."
    validator_status: PASS_WITH_CONSTRAINTS
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: false
    allowed_behavior: "Pass unchanged to Portfolio Engine as inventory management action."
    audit_required: true

  - rule_id: VAL_MRV_005
    station: 5
    validator: MarketRiskValidator
    category: market_risk_confidence
    trigger: "Asset confidence_score is below 0.60 and requested action is INCREASE."
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: "Downgrade action from INCREASE to HOLD."
    audit_required: true

  - rule_id: VAL_MRV_006
    station: 5
    validator: MarketRiskValidator
    category: market_risk_trend
    trigger: "Asset trend_status is BULLISH, regime_shift_probability is >= 40.0 and requested action is INCREASE."
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: "Downgrade action from INCREASE to HOLD."
    audit_required: true

  - rule_id: VAL_MRV_007
    station: 5
    validator: MarketRiskValidator
    category: market_risk_correlation
    trigger: "peak_asset_correlation_20d is >= 0.80 and both assets in peak_correlation_pair requested INCREASE."
    validator_status: DOWNGRADED
    system_status: NORMAL_CONTINUE
    pipeline_action: CONTINUE
    repair_allowed: true
    allowed_repair: "Apply deterministic tie-breaker. Winner keeps INCREASE. Losing asset is downgraded to HOLD. If no clear winner exists, both assets are downgraded to HOLD."
    audit_required: true

  - rule_id: VAL_ENG_001
    station: 6
    validator: PortfolioEngine
    category: portfolio_construction
    trigger: "No feasible target allocation can be constructed under the given constraints."
    engine_status: PORTFOLIO_CONSTRUCTION_FAILED
    system_status: NO_NEW_ACTIONS
    pipeline_action: STOP_BEFORE_STATION_7
    repair_allowed: false
    audit_required: true

  - rule_id: VAL_ENG_002
    station: 6
    validator: PortfolioEngine
    category: portfolio_output_integrity
    trigger: "Target asset weights plus cash quota do not sum to 1.0 within tolerance ±0.0001."
    engine_status: TECHNICAL_ERROR
    system_status: SAFE_HOLD
    pipeline_action: STOP
    repair_allowed: false
    audit_required: true

  - rule_id: VAL_ENG_003
    station: 6
    validator: PortfolioEngine
    category: portfolio_input_integrity
    trigger: "Required portfolio, price or numeric input data is missing, stale, invalid or mathematically inconsistent."
    engine_status: TECHNICAL_ERROR
    system_status: SAFE_HOLD
    pipeline_action: STOP
    repair_allowed: false
    audit_required: true

  - rule_id: VAL_PTR_001
    station: 7
    validator: PostTradeRiskValidator
    category: post_trade_single_asset_exposure
    trigger: "Calculated target weight for an asset exceeds configured single-asset exposure limit."
    validator_status: POST_TRADE_RISK_REJECTED
    system_status: NO_NEW_ACTIONS
    pipeline_action: STOP_BEFORE_STATION_8
    repair_allowed: false
    mutation_allowed: false
    audit_required: true

  - rule_id: VAL_PTR_002
    station: 7
    validator: PostTradeRiskValidator
    category: post_trade_concentration_hhi
    trigger: "Calculated Herfindahl-Hirschman-Index exceeds configured hard concentration limit."
    validator_status: POST_TRADE_RISK_REJECTED
    system_status: NO_NEW_ACTIONS
    pipeline_action: STOP_BEFORE_STATION_8
    repair_allowed: false
    mutation_allowed: false
    audit_required: true

  - rule_id: VAL_PTR_003
    station: 7
    validator: PostTradeRiskValidator
    category: post_trade_risk_configuration_integrity
    trigger: "Required mandate limits, guardrails, post-trade metrics or risk configuration data are missing, stale, invalid or not loadable."
    validator_status: TECHNICAL_ERROR
    system_status: SAFE_HOLD
    pipeline_action: STOP
    repair_allowed: false
    mutation_allowed: false
    audit_required: true

  - rule_id: VAL_ORD_001
    station: 8
    validator: OrderValidator
    category: order_input_integrity
    trigger: "Proposed order list is malformed, incomplete, invalid or missing required fields."
    validator_status: BLOCKED
    system_status: SAFE_HOLD
    pipeline_action: STOP
    order_proposal_status: REJECTED
    repair_allowed: false
    mutation_allowed: false
    audit_required: true

  - rule_id: VAL_ORD_002
    station: 8
    validator: OrderValidator
    category: order_liquidity_check
    trigger: "Proposed order violates configured liquidity, ADV or market-status limits."
    validator_status: REJECTED
    system_status: NO_NEW_ACTIONS
    pipeline_action: STOP_BEFORE_EXECUTION_SIMULATION
    order_proposal_status: REJECTED
    repair_allowed: false
    mutation_allowed: false
    audit_required: true

  - rule_id: VAL_ORD_003
    station: 8
    validator: OrderValidator
    category: broker_tick_lot_normalization
    trigger: "Proposed order requires broker tick-size, lot-size or minimum-quantity normalization."
    status_resolution: conditional
    allowed_outcomes:
      - validator_status: DOWNGRADED
        system_status: NORMAL_CONTINUE
        pipeline_action: CONTINUE
        order_proposal_status: APPROVED
      - validator_status: REJECTED
        system_status: NO_NEW_ACTIONS
        pipeline_action: STOP_BEFORE_EXECUTION_SIMULATION
        order_proposal_status: REJECTED
    repair_allowed: true
    allowed_repair: "Only harmless technical normalization: conservative tick-size rounding, downward lot-size rounding, or plan-neutral zero-order removal. Any non-harmless adjustment rejects the entire order list."
    mutation_allowed: true
    mutation_scope: "Technical normalization only. No strategy, side, asset, order type or risk-increasing change."
    audit_required: true

  - rule_id: VAL_ORD_004
    station: 8
    validator: OrderValidator
    category: order_cost_slippage_check
    trigger: "Projected slippage, spread costs or commissions exceed configured threshold."
    validator_status: REJECTED
    system_status: NO_NEW_ACTIONS
    pipeline_action: STOP_BEFORE_EXECUTION_SIMULATION
    order_proposal_status: REJECTED
    repair_allowed: false
    mutation_allowed: false
    audit_required: true

  - rule_id: VAL_ORD_005
    station: 8
    validator: OrderValidator
    category: order_plan_compliance
    trigger: "Normalized order list would violate the Station-7-approved target plan, approved deltas or post-trade constraint."
    validator_status: REJECTED
    system_status: NO_NEW_ACTIONS
    pipeline_action: STOP_BEFORE_EXECUTION_SIMULATION
    order_proposal_status: REJECTED
    repair_allowed: false
    mutation_allowed: false
    audit_required: true
